operator:
  image:
    repository: nginx
    pullPolicy: IfNotPresent
    tag: ""

  replicaCount: 1

  serviceAccount:
    automount: true
    annotations: {}

  resources:
    requests:
      cpu: 10m
    limit:
      memory: 100Mi

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
      # - secretName: chart-example-tls
      #   hosts:
      #     - chart-example.local

  livenessProbe:
    httpGet:
      path: /
      port: http
    readinessProbe:
      httpGet:
        path: /
        port: http
  
  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  
  securityContext:
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  service:
    type: ClusterIP
    port: 8080


frontend:
  image:
    repository: nginx
    pullPolicy: IfNotPresent
    tag: ""

  replicaCount: 1

  serviceAccount:
    automount: true
    annotations: {}

  resources:
    requests:
