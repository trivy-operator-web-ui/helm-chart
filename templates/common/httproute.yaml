{{- if .Values.common.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "trivy-operator-web-ui.name" . }}
  labels:
    {{- include "trivy-operator-web-ui.labels" . | nindent 4 }}
  {{- with .Values.common.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.common.httpRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.common.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      {{- with .Values.frontend.httpRoute.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "trivy-operator-web-ui-frontend.name" . }}
          port: {{ .Values.frontend.service.port }}
          weight: 1
    - matches:
      - path:
          type: PathPrefix
          value: /api
      {{- with .Values.operator.httpRoute.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "trivy-operator-web-ui-operator.name" . }}
          port: {{ .Values.operator.service.port }}
          weight: 1
{{- end }}
