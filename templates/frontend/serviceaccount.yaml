apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trivy-operator-web-ui-frontend.name" . }}
  labels:
    {{- include "trivy-operator-web-ui-frontend.labels" . | nindent 4 }}
  {{- with .Values.frontend.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.frontend.serviceAccount.automount }}