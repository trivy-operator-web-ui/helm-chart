apiVersion: v1
kind: Service
metadata:
  name: {{ include "trivy-operator-web-ui-frontend.name" . }}
  labels:
    {{- include "trivy-operator-web-ui-frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "trivy-operator-web-ui-frontend.selectorLabels" . | nindent 4 }}
