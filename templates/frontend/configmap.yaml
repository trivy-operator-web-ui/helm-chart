{{- if and (not .Values.common.ingress.enabled) (not .Values.common.httpRoute.enabled) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trivy-operator-web-ui-frontend.name" . }}
  labels:
    {{- include "trivy-operator-web-ui-frontend.labels" . | nindent 4 }}
data:
  config.json: |-
    {
      "backendUrl": {{ .Values.operator.url | required ".Values.operator.url is required since no ingress or httpRoute is configured !" | quote }}
    }
{{- end }}