name: 📦 Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: 📦 SemVer release
    runs-on: ubuntu-latest
    steps:
      - name: 🔽 Checkout repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      
      - name: 🛠️ Set up Docker
        uses: docker/setup-docker-action@v5

      - name: 🔒 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: 🛠️ Install YQ
        env:
          YQ_VERSION: "v4.52.4"
        run: |
          wget -q https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64 \
            -O /usr/local/bin/yq

          chmod +x /usr/local/bin/yq

      - name: 🛠️ Install Helm
        uses: azure/setup-helm@v4.3.0

      - name: 🛠️ Install Helm Unittest
        run: |
          helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest.git

      - name: 📦 Release
        uses: cocogitto/cocogitto-action@v4
        id: release
        with:
          command: bump
          args: --auto
          git-user: "github-actions[bot]"
          git-user-email: "41898282+github-actions[bot]@users.noreply.github.com"