name: 🧪 Apply tests

on: 
  pull_request:
    branches:
      - main

jobs:
  Apply-Tests:
    name: 🧪 Apply tests
    runs-on: ubuntu-latest
    steps:
      - name: 🔽 Checkout repository code
        uses: actions/checkout@v6

      - name: 🛠️ Install Helm
        uses: azure/setup-helm@v4.3.0

      - name: 🛠️ Install Kwok
        uses: kubernetes-sigs/kwok@main
        with:
          command: kwokctl

      - name: 🛠️ Setup Kwok cluster
        run: |
          kwokctl create cluster --name=kwok
          kwokctl kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.0/standard-install.yaml

      - name: 🧪 Setup Kwok cluster
        run: |
          helm install \
            -f tests/values/values.default.yaml \
            --namespace trivy-operator-web-ui \
            --create-namespace \
            trivy-operator-web-ui \
            .

          helm upgrade \
            -f tests/values/values.no-external.yaml \
            --namespace trivy-operator-web-ui \
            trivy-operator-web-ui \
            .